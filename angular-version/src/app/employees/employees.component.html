<div class="table-panel">
  <div class="toolbar">
    <mat-form-field appearance="outline">
      <mat-label>Search</mat-label>
      <input matInput [value]="searchTerm()" (input)="searchTerm.set($any($event.target).value)" placeholder="Name or department">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Status</mat-label>
      <mat-select [value]="statusFilter()" (selectionChange)="statusFilter.set($event.value)">
        <mat-option *ngFor="let status of statuses" [value]="status">{{ status }}</mat-option>
      </mat-select>
    </mat-form-field>

    <button mat-stroked-button color="primary" (click)="addEmployee()">Add</button>
    <button mat-stroked-button (click)="editEmployee()">Edit</button>
    <button mat-stroked-button color="warn" (click)="deleteEmployee()">Delete</button>
  </div>

  <table mat-table [dataSource]="filteredEmployees()">
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Name</th>
      <td mat-cell *matCellDef="let employee">{{ employee.name }}</td>
    </ng-container>

    <ng-container matColumnDef="department">
      <th mat-header-cell *matHeaderCellDef>Department</th>
      <td mat-cell *matCellDef="let employee">{{ employee.department }}</td>
    </ng-container>

    <ng-container matColumnDef="salary">
      <th mat-header-cell *matHeaderCellDef class="numeric">Salary</th>
      <td mat-cell *matCellDef="let employee" class="numeric">{{ employee.salary | currency }}</td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let employee">
        <span class="status-badge" [ngClass]="statusClass(employee.status)">{{ employee.status }}</span>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr
      mat-row
      *matRowDef="let employee; columns: displayedColumns"
      [class.selected-row]="selectedEmployee()?.id === employee.id"
      (click)="selectedEmployee.set(employee)">
    </tr>
  </table>
</div>
