<div class="table-panel">
  <div class="toolbar">
    <mat-form-field appearance="outline">
      <mat-label>Department</mat-label>
      <mat-select [ngModel]="selectedDepartment()" (ngModelChange)="selectedDepartment.set($event)">
        <mat-option *ngFor="let department of departments()" [value]="department">{{ department }}</mat-option>
      </mat-select>
    </mat-form-field>
  </div>

  <table mat-table [dataSource]="filteredSummaries()">
    <ng-container matColumnDef="department">
      <th mat-header-cell *matHeaderCellDef>Department</th>
      <td mat-cell *matCellDef="let row">{{ row.department }}</td>
    </ng-container>

    <ng-container matColumnDef="employeeCount">
      <th mat-header-cell *matHeaderCellDef class="numeric">Employees</th>
      <td mat-cell *matCellDef="let row" class="numeric">{{ row.employeeCount }}</td>
    </ng-container>

    <ng-container matColumnDef="totalSalary">
      <th mat-header-cell *matHeaderCellDef class="numeric">Total Salary</th>
      <td mat-cell *matCellDef="let row" class="numeric">{{ row.totalSalary | currency }}</td>
    </ng-container>

    <ng-container matColumnDef="averageSalary">
      <th mat-header-cell *matHeaderCellDef class="numeric">Average Salary</th>
      <td mat-cell *matCellDef="let row" class="numeric">{{ row.averageSalary | currency }}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</div>
