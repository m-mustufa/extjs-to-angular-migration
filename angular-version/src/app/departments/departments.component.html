<div class="table-panel">
  <div class="toolbar">
    <button mat-stroked-button color="primary" (click)="addDepartment()">Add</button>
    <button mat-stroked-button (click)="editDepartment()">Edit</button>
    <button mat-stroked-button color="warn" (click)="deleteDepartment()">Delete</button>
  </div>

  <table mat-table [dataSource]="departments()">
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Department Name</th>
      <td mat-cell *matCellDef="let department">{{ department.name }}</td>
    </ng-container>

    <ng-container matColumnDef="manager">
      <th mat-header-cell *matHeaderCellDef>Manager</th>
      <td mat-cell *matCellDef="let department">{{ department.manager }}</td>
    </ng-container>

    <ng-container matColumnDef="employeeCount">
      <th mat-header-cell *matHeaderCellDef class="numeric">Employee Count</th>
      <td mat-cell *matCellDef="let department" class="numeric">{{ department.employeeCount }}</td>
    </ng-container>

    <ng-container matColumnDef="budget">
      <th mat-header-cell *matHeaderCellDef class="numeric">Budget</th>
      <td mat-cell *matCellDef="let department" class="numeric">{{ department.budget | currency }}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr
      mat-row
      *matRowDef="let department; columns: displayedColumns"
      [class.selected-row]="selectedDepartment()?.id === department.id"
      (click)="selectedDepartment.set(department)">
    </tr>
  </table>
</div>
