<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enterprise Dashboard - ExtJS 6</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/extjs/6.2.0/classic/theme-triton/resources/theme-triton-all.css">

  <style>
    html,
    body {
      height: 100%;
      margin: 0;
      background: #eef2f6;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    .app-shell,
    .app-workspace {
      background: #f5f7fb;
    }

    .app-header {
      background: #1e2a3a;
      border-bottom: 1px solid #111925;
      box-shadow: none;
    }

    .topbar {
      align-items: center;
      display: flex;
      height: 60px;
      padding: 0 28px;
    }

    .topbar-title {
      color: #fff;
      flex: 1;
      font-size: 20px;
      font-weight: 700;
      line-height: 24px;
    }

    .topbar-actions {
      align-items: center;
      display: flex;
      gap: 16px;
    }

    .notification-bell {
      align-items: center;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 20px;
      color: #dce7f3;
      display: flex;
      font-size: 16px;
      height: 36px;
      justify-content: center;
      position: relative;
      width: 36px;
    }

    .notification-bell:after {
      background: #e04f5f;
      border: 2px solid #fff;
      border-radius: 50%;
      content: "";
      height: 9px;
      position: absolute;
      right: 7px;
      top: 7px;
      width: 9px;
    }

    .user-profile {
      align-items: center;
      display: flex;
      gap: 10px;
    }

    .user-avatar {
      align-items: center;
      background: #5fa2dd;
      border-radius: 50%;
      color: #fff;
      display: flex;
      font-size: 13px;
      font-weight: 700;
      height: 36px;
      justify-content: center;
      width: 36px;
    }

    .user-name {
      color: #fff;
      font-size: 13px;
      font-weight: 600;
    }

    .user-role {
      color: #9eabba;
      font-size: 11px;
      margin-top: 2px;
    }

    .brand-block {
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      margin: 0 18px 18px;
      padding: 0 0 18px;
    }

    .brand-mark {
      align-items: center;
      background: #5fa2dd;
      border-radius: 8px;
      color: #fff;
      display: inline-flex;
      font-size: 16px;
      font-weight: 700;
      height: 38px;
      justify-content: center;
      margin-right: 10px;
      vertical-align: middle;
      width: 38px;
    }

    .brand-name {
      color: #fff;
      display: inline-block;
      font-size: 17px;
      font-weight: 700;
      line-height: 18px;
      vertical-align: middle;
    }

    .brand-subtitle {
      color: #93a4ba;
      font-size: 13px;
      margin-left: 52px;
      margin-top: 2px;
    }

    .sidebar-panel .x-panel-body {
      background: #1a2332;
      border-right: 1px solid #111925;
    }

    .nav-button {
      background: transparent;
      border: 0;
      color: #9eabba;
      display: block;
      font-size: 15px;
      line-height: 44px;
      margin: 4px 14px;
      padding: 0 16px;
      text-align: left;
      width: calc(100% - 28px);
    }

    .nav-button .x-btn-inner {
      color: inherit;
      font-weight: 500;
      text-align: left;
    }

    .nav-button .x-btn-icon-el {
      color: inherit;
      font-size: 15px;
      opacity: 0.88;
    }

    .nav-button:hover,
    .nav-button.active {
      background: #263246;
      border-left: 4px solid #fff;
      color: #fff;
    }

    .content-card {
      background: #fff;
      border: 1px solid #e1e7ef;
      box-shadow: 0 10px 28px rgba(26, 35, 50, 0.06);
    }

    .stat-card {
      background: #fff;
      border: 1px solid #e1e7ef;
      box-shadow: 0 10px 28px rgba(26, 35, 50, 0.06);
      overflow: hidden;
      padding: 0;
    }

    .stat-inner {
      min-height: 126px;
      padding: 24px 26px;
    }

    .stat-blue {
      border-left: 5px solid #4f8fd8;
    }

    .stat-green {
      border-left: 5px solid #1f9d75;
    }

    .stat-orange {
      border-left: 5px solid #d28a18;
    }

    .stat-gray {
      border-left: 5px solid #687586;
    }

    .stat-label {
      color: #748295;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    .stat-value {
      color: #24364b;
      font-size: 44px;
      font-weight: 800;
      line-height: 48px;
    }

    .stat-blue .stat-value {
      color: #4f8fd8;
    }

    .stat-green .stat-value {
      color: #1f9d75;
    }

    .stat-orange .stat-value {
      color: #d28a18;
    }

    .stat-gray .stat-value {
      color: #687586;
    }

    .stat-change {
      color: #7b899a;
      font-size: 13px;
      font-weight: 600;
      margin-top: 12px;
    }

    .status-pill {
      border-radius: 12px;
      color: #fff;
      display: inline-block;
      font-size: 12px;
      font-weight: 600;
      min-width: 72px;
      padding: 3px 10px;
      text-align: center;
    }

    .status-active {
      background: #1f9d75;
    }

    .status-on-leave {
      background: #d28a18;
    }

    .status-inactive {
      background: #687586;
    }

    .chart-header {
      margin-bottom: 22px;
    }

    .chart-title {
      color: #24364b;
      font-size: 18px;
      font-weight: 700;
      line-height: 24px;
    }

    .chart-subtitle {
      color: #748295;
      font-size: 13px;
      line-height: 20px;
      margin-top: 4px;
    }

    .chart-legend {
      align-items: center;
      color: #66768a;
      display: flex;
      font-size: 12px;
      font-weight: 600;
      gap: 8px;
      margin-top: 14px;
    }

    .legend-swatch {
      background: #4f8fd8;
      border-radius: 3px;
      display: inline-block;
      height: 10px;
      width: 22px;
    }

    .chart-wrap {
      background-color: #fff;
      background-image: linear-gradient(to right, #edf1f6 1px, transparent 1px);
      background-size: 20% 100%;
      border: 1px solid #e1e7ef;
      padding: 20px 24px 16px;
    }

    .chart-row {
      align-items: center;
      display: flex;
      margin: 16px 0;
    }

    .chart-label {
      color: #34475d;
      font-size: 13px;
      font-weight: 600;
      width: 150px;
    }

    .chart-track {
      flex: 1;
      padding-right: 12px;
    }

    .chart-bar {
      background: linear-gradient(90deg, #73b2e7 0%, #4f8fd8 100%);
      border-radius: 5px;
      box-shadow: 0 6px 12px rgba(79, 143, 216, 0.18);
      height: 24px;
      min-width: 34px;
    }

    .chart-value {
      color: #24364b;
      font-size: 13px;
      font-weight: 700;
      text-align: right;
      width: 42px;
    }

    .activity-item {
      align-items: flex-start;
      border-bottom: 1px solid #e3e9f0;
      display: flex;
      gap: 11px;
      padding: 16px 4px;
    }

    .activity-dot {
      border-radius: 50%;
      flex: 0 0 auto;
      height: 10px;
      margin-top: 5px;
      width: 10px;
    }

    .dot-blue {
      background: #4f8fd8;
    }

    .dot-green {
      background: #1f9d75;
    }

    .dot-orange {
      background: #d28a18;
    }

    .dot-gray {
      background: #687586;
    }

    .activity-title {
      color: #24364b;
      font-size: 14px;
      font-weight: 600;
    }

    .activity-meta {
      color: #66768a;
      font-size: 12px;
      margin-top: 3px;
    }

    .activity-footer {
      color: #4f8fd8;
      display: block;
      font-size: 13px;
      font-weight: 700;
      padding: 14px 4px 2px;
      text-decoration: none;
    }

    .cdn-error {
      background: #fff;
      border: 1px solid #d9e1ea;
      box-shadow: 0 10px 24px rgba(36, 54, 75, 0.08);
      color: #26384d;
      margin: 48px auto;
      max-width: 560px;
      padding: 24px;
    }

    .cdn-error h1 {
      color: #24364b;
      font-size: 22px;
      font-weight: 600;
      margin: 0 0 10px;
    }

    .cdn-error p {
      color: #66768a;
      font-size: 14px;
      line-height: 1.5;
      margin: 0;
    }
  </style>

  <script>
    (function () {
      var addEventListener = window.addEventListener;

      window.addEventListener = function (type, listener, options) {
        if (type === 'unload') {
          return;
        }

        return addEventListener.call(this, type, listener, options);
      };
    }());
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/extjs/6.2.0/ext-all.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/extjs/6.2.0/classic/theme-triton/theme-triton.js"></script>
</head>
<body>
  <script>
    (function () {
      'use strict';

      if (!window.Ext) {
        document.addEventListener('DOMContentLoaded', function () {
          document.body.innerHTML = [
            '<div class="cdn-error">',
            '<h1>ExtJS could not be loaded</h1>',
            '<p>Please check your internet connection and confirm the CDN scripts are not blocked by the browser or network.</p>',
            '</div>'
          ].join('');
        });

        return;
      }

      var employeeData = [
        { id: 1, name: 'Ayesha Khan', department: 'Finance', salary: 82000, status: 'Active' },
        { id: 2, name: 'Daniel Reed', department: 'Engineering', salary: 112000, status: 'Active' },
        { id: 3, name: 'Maria Santos', department: 'Human Resources', salary: 76000, status: 'On Leave' },
        { id: 4, name: 'Omar Farooq', department: 'Operations', salary: 69000, status: 'Active' },
        { id: 5, name: 'Priya Mehta', department: 'Product', salary: 98000, status: 'Inactive' },
        { id: 6, name: 'Nora Ellis', department: 'Sales', salary: 88000, status: 'Active' },
        { id: 7, name: 'Hassan Ali', department: 'Engineering', salary: 105000, status: 'On Leave' },
        { id: 8, name: 'Sofia Chen', department: 'Support', salary: 72000, status: 'Active' }
      ];

      var departmentData = [
        { id: 1, name: 'Engineering', manager: 'Daniel Reed', employeeCount: 2, budget: 420000 },
        { id: 2, name: 'Finance', manager: 'Ayesha Khan', employeeCount: 1, budget: 210000 },
        { id: 3, name: 'Human Resources', manager: 'Maria Santos', employeeCount: 1, budget: 160000 },
        { id: 4, name: 'Operations', manager: 'Omar Farooq', employeeCount: 1, budget: 185000 },
        { id: 5, name: 'Product', manager: 'Priya Mehta', employeeCount: 1, budget: 245000 },
        { id: 6, name: 'Sales', manager: 'Nora Ellis', employeeCount: 1, budget: 230000 },
        { id: 7, name: 'Support', manager: 'Sofia Chen', employeeCount: 1, budget: 150000 }
      ];

      Ext.define('Enterprise.model.Employee', {
        extend: 'Ext.data.Model',
        fields: [
          { name: 'id', type: 'int' },
          { name: 'name', type: 'string' },
          { name: 'department', type: 'string' },
          { name: 'salary', type: 'float' },
          { name: 'status', type: 'string' }
        ]
      });

      Ext.define('Enterprise.model.Department', {
        extend: 'Ext.data.Model',
        fields: [
          { name: 'id', type: 'int' },
          { name: 'name', type: 'string' },
          { name: 'manager', type: 'string' },
          { name: 'employeeCount', type: 'int' },
          { name: 'budget', type: 'float' }
        ]
      });

      function renderStatus(value) {
        var className = value === 'Active' ? 'status-active' : value === 'On Leave' ? 'status-on-leave' : 'status-inactive';

        return '<span class="status-pill ' + className + '">' + Ext.String.htmlEncode(value) + '</span>';
      }

      function buildDepartmentSummary(records) {
        var summary = {};
        var rows = [];

        Ext.Array.each(records, function (record) {
          var department = record.get ? record.get('department') : record.department;
          var salary = record.get ? record.get('salary') : record.salary;

          if (!summary[department]) {
            summary[department] = {
              department: department,
              employeeCount: 0,
              totalSalary: 0,
              averageSalary: 0
            };
          }

          summary[department].employeeCount += 1;
          summary[department].totalSalary += salary;
        });

        Ext.Object.each(summary, function (department, item) {
          item.averageSalary = item.totalSalary / item.employeeCount;
          rows.push(item);
        });

        return rows;
      }

      function buildDepartmentChartHtml(records) {
        var counts = {};
        var max = 1;
        var rows = [];

        Ext.Array.each(records, function (record) {
          var department = record.get ? record.get('department') : record.department;

          counts[department] = (counts[department] || 0) + 1;
          max = Math.max(max, counts[department]);
        });

        Ext.Object.each(counts, function (department, count) {
          rows.push([
            '<div class="chart-row">',
            '<div class="chart-label">', Ext.String.htmlEncode(department), '</div>',
            '<div class="chart-track"><div class="chart-bar" style="width:', Math.max(18, Math.round((count / max) * 100)), '%"></div></div>',
            '<div class="chart-value">', count, '</div>',
            '</div>'
          ].join(''));
        });

        return [
          '<div class="chart-header">',
          '<div class="chart-title">Employee Count by Department</div>',
          '<div class="chart-subtitle">Current workforce distribution across operational departments.</div>',
          '<div class="chart-legend"><span class="legend-swatch"></span><span>Employees</span></div>',
          '</div>',
          '<div class="chart-wrap">',
          rows.join(''),
          '</div>'
        ].join('');
      }

      Ext.application({
        name: 'EnterpriseDashboard',

        launch: function () {
          var employeeStore = Ext.create('Ext.data.Store', {
            model: 'Enterprise.model.Employee',
            data: employeeData
          });
          var departmentStore = Ext.create('Ext.data.Store', {
            model: 'Enterprise.model.Department',
            data: departmentData
          });
          var reportStore = Ext.create('Ext.data.Store', {
            fields: ['department', 'employeeCount', 'totalSalary', 'averageSalary'],
            data: buildDepartmentSummary(employeeStore.getRange())
          });
          var nextEmployeeId = employeeStore.max('id') + 1;
          var nextDepartmentId = departmentStore.max('id') + 1;
          var editingEmployee = null;
          var editingDepartment = null;
          var appCards;
          var navButtons = {};
          var dashboardStats;
          var dashboardChart;
          var pageTitles = {
            dashboardPage: 'Dashboard',
            employeesPage: 'Employees',
            departmentsPage: 'Departments',
            reportsPage: 'Reports'
          };
          var employeeGrid;
          var employeeForm;
          var employeeSearch;
          var employeeStatusFilter;
          var departmentGrid;
          var departmentForm;
          var reportGrid;
          var reportDepartmentFilter;

          function employeeRecords() {
            return employeeStore.getRange();
          }

          function refreshReports() {
            var selectedDepartment = reportDepartmentFilter ? reportDepartmentFilter.getValue() : 'All';

            reportStore.loadData(buildDepartmentSummary(employeeRecords()));

            if (reportDepartmentFilter) {
              reportDepartmentFilter.getStore().loadData(['All'].concat(Ext.Array.unique(Ext.Array.pluck(employeeDataFromStore(), 'department')).sort()));
              reportDepartmentFilter.setValue(selectedDepartment || 'All');
            }

            applyReportFilter();
          }

          function employeeDataFromStore() {
            var rows = [];

            employeeStore.clearFilter(true);
            employeeStore.each(function (record) {
              rows.push(record.getData());
            });
            applyEmployeeFilters();

            return rows;
          }

          function updateDashboard() {
            var records = employeeRecords();
            var total = records.length;
            var active = 0;
            var onLeave = 0;
            var inactive = 0;

            Ext.Array.each(records, function (record) {
              if (record.get('status') === 'Active') {
                active += 1;
              } else if (record.get('status') === 'On Leave') {
                onLeave += 1;
              } else {
                inactive += 1;
              }
            });

            dashboardStats.refreshStats({
              total: total,
              active: active,
              onLeave: onLeave,
              inactive: inactive
            });
            dashboardChart.update(buildDepartmentChartHtml(records));
          }

          function applyEmployeeFilters() {
            var searchValue = employeeSearch ? Ext.String.trim((employeeSearch.getValue() || '').toLowerCase()) : '';
            var statusValue = employeeStatusFilter ? employeeStatusFilter.getValue() : 'All';

            employeeStore.clearFilter(true);
            employeeStore.filterBy(function (record) {
              var name = (record.get('name') || '').toLowerCase();
              var department = (record.get('department') || '').toLowerCase();
              var matchesSearch = !searchValue || name.indexOf(searchValue) !== -1 || department.indexOf(searchValue) !== -1;
              var matchesStatus = statusValue === 'All' || record.get('status') === statusValue;

              return matchesSearch && matchesStatus;
            });
          }

          function clearEmployeeForm() {
            editingEmployee = null;
            employeeForm.getForm().reset();
            employeeForm.setTitle('Add Employee');
            employeeForm.down('#saveEmployeeButton').setText('Add Employee');
            employeeGrid.getSelectionModel().deselectAll();
          }

          function getSelectedEmployee(action) {
            var record = employeeGrid.getSelectionModel().getSelection()[0];

            if (!record) {
              Ext.Msg.alert('No Employee Selected', 'Please select an employee to ' + action + '.');
              return null;
            }

            return record;
          }

          function loadEmployee() {
            var record = getSelectedEmployee('edit');

            if (!record) {
              return;
            }

            editingEmployee = record;
            employeeForm.setTitle('Edit Employee');
            employeeForm.down('#saveEmployeeButton').setText('Save Changes');
            employeeForm.getForm().loadRecord(record);
          }

          function saveEmployee() {
            var form = employeeForm.getForm();
            var values;

            if (!form.isValid()) {
              return;
            }

            values = form.getValues();
            values.salary = parseFloat(values.salary);

            if (editingEmployee) {
              editingEmployee.set(values);
              editingEmployee.commit();
            } else {
              values.id = nextEmployeeId++;
              employeeStore.add(values);
            }

            clearEmployeeForm();
            applyEmployeeFilters();
            refreshReports();
            updateDashboard();
          }

          function deleteEmployee() {
            var record = getSelectedEmployee('delete');

            if (!record) {
              return;
            }

            Ext.Msg.confirm('Delete Employee', 'Delete ' + record.get('name') + ' from the employee list?', function (choice) {
              if (choice === 'yes') {
                employeeStore.remove(record);
                clearEmployeeForm();
                applyEmployeeFilters();
                refreshReports();
                updateDashboard();
              }
            });
          }

          function clearDepartmentForm() {
            editingDepartment = null;
            departmentForm.getForm().reset();
            departmentForm.setTitle('Add Department');
            departmentForm.down('#saveDepartmentButton').setText('Add Department');
            departmentGrid.getSelectionModel().deselectAll();
          }

          function getSelectedDepartment(action) {
            var record = departmentGrid.getSelectionModel().getSelection()[0];

            if (!record) {
              Ext.Msg.alert('No Department Selected', 'Please select a department to ' + action + '.');
              return null;
            }

            return record;
          }

          function loadDepartment() {
            var record = getSelectedDepartment('edit');

            if (!record) {
              return;
            }

            editingDepartment = record;
            departmentForm.setTitle('Edit Department');
            departmentForm.down('#saveDepartmentButton').setText('Save Changes');
            departmentForm.getForm().loadRecord(record);
          }

          function saveDepartment() {
            var form = departmentForm.getForm();
            var values;

            if (!form.isValid()) {
              return;
            }

            values = form.getValues();
            values.employeeCount = parseInt(values.employeeCount, 10);
            values.budget = parseFloat(values.budget);

            if (editingDepartment) {
              editingDepartment.set(values);
              editingDepartment.commit();
            } else {
              values.id = nextDepartmentId++;
              departmentStore.add(values);
            }

            clearDepartmentForm();
          }

          function deleteDepartment() {
            var record = getSelectedDepartment('delete');

            if (!record) {
              return;
            }

            Ext.Msg.confirm('Delete Department', 'Delete ' + record.get('name') + ' from departments?', function (choice) {
              if (choice === 'yes') {
                departmentStore.remove(record);
                clearDepartmentForm();
              }
            });
          }

          function applyReportFilter() {
            var department = reportDepartmentFilter ? reportDepartmentFilter.getValue() : 'All';

            reportStore.clearFilter(true);

            if (department && department !== 'All') {
              reportStore.filter('department', department);
            }
          }

          function showPage(pageId) {
            appCards.getLayout().setActiveItem(pageId);
            Ext.fly('topPageTitle').update(pageTitles[pageId]);

            Ext.Object.each(navButtons, function (id, button) {
              button.removeCls('active');
            });
            navButtons[pageId].addCls('active');

            if (pageId === 'dashboardPage') {
              updateDashboard();
            } else if (pageId === 'reportsPage') {
              refreshReports();
            }
          }

          function navItem(text, pageId, iconCls) {
            return {
              xtype: 'button',
              text: text,
              cls: 'nav-button',
              iconCls: iconCls,
              scale: 'large',
              handler: function (button) {
                showPage(pageId);
              },
              listeners: {
                afterrender: function (button) {
                  navButtons[pageId] = button;
                }
              }
            };
          }

          dashboardStats = Ext.create('Ext.container.Container', {
            layout: {
              type: 'hbox',
              align: 'stretch'
            },
            defaults: {
              xtype: 'component',
              flex: 1,
              margin: '0 18 24 0',
              cls: 'stat-card'
            },
            tpl: [
              '<div class="stat-label">Total Employees</div><div class="stat-value">{total}</div><div class="stat-accent"></div>',
              '<tpl if="false"></tpl>'
            ],
            refreshStats: function (data) {
              this.items.getAt(0).update('<div class="stat-inner stat-blue"><div class="stat-label">Total Employees</div><div class="stat-value">' + data.total + '</div><div class="stat-change">+12% this month</div></div>');
              this.items.getAt(1).update('<div class="stat-inner stat-green"><div class="stat-label">Active Employees</div><div class="stat-value">' + data.active + '</div><div class="stat-change">+8% this month</div></div>');
              this.items.getAt(2).update('<div class="stat-inner stat-orange"><div class="stat-label">On Leave</div><div class="stat-value">' + data.onLeave + '</div><div class="stat-change">+3% this month</div></div>');
              this.items.getAt(3).update('<div class="stat-inner stat-gray"><div class="stat-label">Inactive</div><div class="stat-value">' + data.inactive + '</div><div class="stat-change">-2% this month</div></div>');
            },
            items: [
              { html: '' },
              { html: '' },
              { html: '' },
              { html: '', margin: '0 0 24 0' }
            ]
          });

          dashboardChart = Ext.create('Ext.panel.Panel', {
            title: 'Employee Count by Department',
            cls: 'content-card',
            bodyPadding: 26,
            flex: 1,
            minHeight: 320,
